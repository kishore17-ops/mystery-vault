<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="55%" stop-color="#0b1226"/>
      <stop offset="100%" stop-color="#121c3a"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c873" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8c873" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#fff8e6"/>
      <stop offset="100%" stop-color="#e8c873"/>
    </radialGradient>
    <linearGradient id="chuteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5fd3c4"/>
      <stop offset="100%" stop-color="#2f8d80"/>
    </linearGradient>
    <linearGradient id="treeFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05060a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#05060a" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="vignette" cx="50%" cy="40%" r="75%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect width="1400" height="900" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#e8e6df" opacity="0.55">
    <circle cx="120" cy="80" r="1.6"/>
    <circle cx="260" cy="160" r="1.2"/>
    <circle cx="430" cy="60" r="1.4"/>
    <circle cx="610" cy="130" r="1.1"/>
    <circle cx="760" cy="50" r="1.6"/>
    <circle cx="940" cy="100" r="1.2"/>
    <circle cx="1120" cy="70" r="1.5"/>
    <circle cx="1300" cy="150" r="1.2"/>
    <circle cx="80" cy="220" r="1.1"/>
    <circle cx="380" cy="220" r="1.2"/>
    <circle cx="980" cy="200" r="1.3"/>
    <circle cx="1240" cy="240" r="1.1"/>
  </g>

  <!-- moon -->
  <circle cx="1140" cy="170" r="150" fill="url(#moonGlow)"/>
  <circle cx="1140" cy="170" r="62" fill="url(#moon)"/>
  <circle cx="1118" cy="150" r="9" fill="#e8c873" opacity="0.4"/>
  <circle cx="1158" cy="190" r="6" fill="#e8c873" opacity="0.35"/>

  <!-- distant aircraft silhouette, rear stairs lowered -->
  <g transform="translate(330,250)" fill="#0b1226" stroke="#1c2a52" stroke-width="2">
    <path d="M0,40 L260,40 C300,40 330,46 360,55 L420,62 C430,63 430,72 420,73 L360,76 C330,80 300,84 260,84 L0,84 C-14,84 -14,40 0,40 Z"/>
    <path d="M150,40 L210,-30 L230,-30 L210,40 Z"/>
    <path d="M150,84 L195,140 L213,140 L195,84 Z"/>
    <path d="M0,55 L-55,80 L-55,90 L0,68 Z"/>
    <circle cx="375" cy="58" r="3" fill="#e8c873" opacity="0.7"/>
  </g>

  <!-- falling cash notes -->
  <g fill="#5fd3c4" opacity="0.55">
    <rect x="520" y="360" width="26" height="16" rx="2" transform="rotate(18 533 368)"/>
    <rect x="600" y="430" width="26" height="16" rx="2" transform="rotate(-12 613 438)"/>
    <rect x="560" y="500" width="26" height="16" rx="2" transform="rotate(30 573 508)"/>
    <rect x="660" y="380" width="26" height="16" rx="2" transform="rotate(-25 673 388)"/>
    <rect x="500" y="470" width="26" height="16" rx="2" transform="rotate(8 513 478)"/>
  </g>

  <!-- parachute and falling figure -->
  <g transform="translate(720,330)">
    <!-- canopy -->
    <path d="M-150,0 C-150,-95 150,-95 150,0 C100,-18 50,-26 0,-26 C-50,-26 -100,-18 -150,0 Z" fill="url(#chuteGrad)" opacity="0.9"/>
    <path d="M-150,0 C-100,-10 -50,-14 0,-14 C50,-14 100,-10 150,0" fill="none" stroke="#05060a" stroke-width="2" opacity="0.3"/>
    <!-- rigging lines -->
    <line x1="-150" y1="0" x2="0" y2="120" stroke="#8d93a8" stroke-width="1.4"/>
    <line x1="-75" y1="-8" x2="0" y2="120" stroke="#8d93a8" stroke-width="1.4"/>
    <line x1="0" y1="-14" x2="0" y2="120" stroke="#8d93a8" stroke-width="1.4"/>
    <line x1="75" y1="-8" x2="0" y2="120" stroke="#8d93a8" stroke-width="1.4"/>
    <line x1="150" y1="0" x2="0" y2="120" stroke="#8d93a8" stroke-width="1.4"/>
    <!-- figure -->
    <circle cx="0" cy="132" r="10" fill="#05060a"/>
    <path d="M0,142 L0,178" stroke="#05060a" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,150 L-26,170" stroke="#05060a" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,150 L24,168" stroke="#05060a" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,178 L-16,212" stroke="#05060a" stroke-width="6" stroke-linecap="round"/>
    <path d="M0,178 L18,210" stroke="#05060a" stroke-width="6" stroke-linecap="round"/>
    <!-- small briefcase -->
    <rect x="-34" y="166" width="16" height="11" rx="2" fill="#c9a13b"/>
  </g>

  <!-- treeline / forest silhouette -->
  <g fill="#05060a">
    <path d="M0,760 L40,700 L70,740 L110,660 L150,720 L190,670 L230,730 L270,650 L310,710 L350,660 L390,720 L430,680 L470,730 L510,665 L550,715 L590,670 L630,725 L670,660 L710,715 L750,670 L790,725 L830,665 L870,715 L910,675 L950,725 L990,660 L1030,715 L1070,670 L1110,725 L1150,665 L1190,715 L1230,675 L1270,725 L1310,660 L1350,715 L1400,680 L1400,900 L0,900 Z"/>
  </g>
  <rect x="0" y="800" width="1400" height="100" fill="#05060a"/>

  <!-- fog over treeline -->
  <rect x="0" y="700" width="1400" height="200" fill="url(#treeFade)" opacity="0.5"/>

  <!-- vignette -->
  <rect width="1400" height="900" fill="url(#vignette)"/>
</svg>
